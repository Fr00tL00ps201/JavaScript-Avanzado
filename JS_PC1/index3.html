<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="contenedorPersonas">
        <h3>Listado de Personas</h3>
        <ul id="lista"></ul>
    </div>

    <script>
        const personas = [
            { nombre: "Ana García", edad: 25, profesion: "Desarrolladora" },
            { nombre: "Juan Pérez", edad: 30, profesion: "Diseñador" },
            { nombre: "Carla Sosa", edad: 22, profesion: "Ingeniera" },
            { nombre: "Roberto Ruiz", edad: 40, profesion: "Arquitecto" },
            { nombre: "Lucía Fernández", edad: 28, profesion: "Médica" }
        ];

        const listaUl = document.getElementById('lista');

        listaUl.innerHTML = personas.map(persona => `
            <li>
                <strong>Nombre:</strong> ${persona.nombre} | 
                <strong>Edad:</strong> ${persona.edad} | 
                <strong>Profesión:</strong> ${persona.profesion}
            </li>
        `).join('');
    </script>
</body>
</html>
